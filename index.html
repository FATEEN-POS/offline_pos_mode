<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فطين POS - نسخة الطباعة الحرارية</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2a36b1; --bg: #f4f6f8; --card: #ffffff; --text: #222; --accent: #4caf50; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #5c6bc0; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* شاشة البداية */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .industry-card { width: 100%; max-width: 250px; padding: 15px; margin: 8px; background: var(--primary); color: white; border-radius: 12px; cursor: pointer; font-weight: bold; border: none; }

        /* الكاميرا */
        #scanner-container { position: absolute; top: 0; width: 100%; height: 30%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 100px; border: 2px solid var(--accent); border-radius: 8px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 10; pointer-events: none; }

        .side-settings { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .side-btn { background: rgba(255,255,255,0.8); color: #333; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

        /* الواجهة السفلية */
        .pos-interface { position: absolute; bottom: 0; width: 100%; height: 72%; background: var(--bg); border-radius: 20px 20px 0 0; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 20; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .total-box { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; }
        .total-price { color: var(--primary); font-size: 1.4rem; font-weight: 800; }
        
        .cart-items { flex: 1; overflow-y: auto; padding: 2px; }
        .item { background: var(--card); padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.9rem; border: 1px solid rgba(0,0,0,0.03); }
        
        .qty-ctrl { display: flex; align-items: center; gap: 8px; }
        .qty-ctrl button { border: none; width: 26px; height: 26px; border-radius: 6px; background: #eee; font-weight: bold; }

        .btn-print { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* بوب اب منتج جديد */
        #product-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; }
        .modal-content input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .modal-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; transition: 0.5s; z-index: 5000; }

        /* --- إعدادات الطباعة الحرارية (80mm / 88mm) --- */
        #receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt, #receipt * { visibility: visible; }
            #receipt { 
                position: absolute; left: 0; top: 0; display: block !important; 
                width: 80mm; padding: 2mm; font-family: 'Courier New', Courier, monospace; 
                background: white; color: black;
            }
            @page { size: 80mm auto; margin: 0; }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="product-modal">
        <div class="modal-content">
            <h4 style="margin:0; text-align:center;">صنف جديد 🏷️</h4>
            <input type="text" id="new-name" placeholder="اسم المنتج">
            <input type="number" id="new-price" placeholder="السعر">
            <button class="modal-btn" onclick="saveNewProduct()">حفظ وإضافة</button>
        </div>
    </div>

    <div id="setup-screen">
        <h3 style="color:var(--primary)">فطين POS</h3>
        <button class="industry-card" onclick="initSystem('supermarket')">🛒 سوبر ماركت</button>
        <button class="industry-card" onclick="initSystem('pharmacy')">💊 صيدلية</button>
    </div>

    <div id="scanner-container">
        <div class="side-settings">
            <button class="side-btn" onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
            <button class="side-btn" onclick="setStoreName()"><i class="fas fa-store"></i></button>
        </div>
        <div class="scanner-overlay"></div>
    </div>

    <div class="pos-interface">
        <div class="total-box">
            <div>
                <div id="s-name-display" style="font-size: 0.75rem; opacity: 0.7;">متجر فطين</div>
                <div style="font-size: 0.9rem; font-weight: bold;">الإجمالي</div>
            </div>
            <div class="total-price"><span id="total-val">0.00</span> <small style="font-size: 0.8rem;">ج.م</small></div>
        </div>
        <div id="cart" class="cart-items"></div>
        <button class="btn-print" onclick="printInvoice()">🖨️ طباعة الفاتورة</button>
    </div>

    <div id="receipt"></div>

    <script>
        let currentDB = {}, cart = {}, currentScanCode = "";

        window.onload = () => {
            if(localStorage.getItem('fatin_setup') === 'done') {
                currentDB = JSON.parse(localStorage.getItem('fatin_db')) || {};
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('s-name-display').innerText = localStorage.getItem('store_name') || "متجر فطين";
                startScanner();
            }
            if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
            showToast("🚀 فطين POS جاهز");
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.bottom = "20px";
            setTimeout(() => t.style.bottom = "-100px", 2500);
        }

        function toggleTheme() {
            const isDark = document.body.hasAttribute('data-theme');
            isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function setStoreName() {
            const n = prompt("اسم المحل:");
            if(n) { localStorage.setItem('store_name', n); document.getElementById('s-name-display').innerText = n; }
        }

        function initSystem(type) {
            localStorage.setItem('fatin_setup', 'done');
            const data = (type === 'supermarket') ? {"6221007011447":{name:"لوتس", price:10}} : {"0000001":{name:"بندول", price:35}};
            localStorage.setItem('fatin_db', JSON.stringify(data));
            location.reload();
        }

        function startScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scanner-container'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "code_128_reader"] }
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((res) => {
                const code = res.codeResult.code;
                if (!window.busy && code) {
                    window.busy = true; handleScan(code);
                    setTimeout(() => window.busy = false, 2000);
                }
            });
        }

        function handleScan(code) {
            currentScanCode = code;
            if (currentDB[code]) { addToCart(code); showToast("✅ " + currentDB[code].name); }
            else { document.getElementById('product-modal').style.display = 'flex'; document.getElementById('new-name').focus(); }
        }

        function saveNewProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            if (name && price) {
                currentDB[currentScanCode] = { name, price: parseFloat(price) };
                localStorage.setItem('fatin_db', JSON.stringify(currentDB));
                addToCart(currentScanCode);
                document.getElementById('product-modal').style.display = 'none';
                document.getElementById('new-name').value = ""; document.getElementById('new-price').value = "";
            }
        }

        function addToCart(code) {
            if (cart[code]) cart[code].qty++; 
            else cart[code] = { ...currentDB[code], qty: 1 };
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart');
            container.innerHTML = ''; let total = 0;
            const ids = Object.keys(cart);
            if (ids.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.4; margin-top:40px;">السلة فارغة</p>';
            } else {
                ids.forEach(id => {
                    let i = cart[id]; total += i.price * i.qty;
                    container.innerHTML += `<div class="item">
                        <div><b>${i.name}</b><br><small>${i.price} ج.م</small></div>
                        <div class="qty-ctrl">
                            <button onclick="changeQty('${id}',-1)">-</button>
                            <b>${i.qty}</b>
                            <button onclick="changeQty('${id}',1)">+</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        function changeQty(id, d) { cart[id].qty += d; if(cart[id].qty <= 0) delete cart[id]; updateUI(); }

        function printInvoice() {
            if (Object.keys(cart).length === 0) return;
            const store = localStorage.getItem('store_name') || "متجر فطين";
            let total = 0;
            let rows = "";
            for (let id in cart) {
                let i = cart[id]; 
                let sub = i.price * i.qty;
                total += sub;
                rows += `<div style="display:flex; justify-content:space-between; font-size: 12px; margin-bottom: 2px;">
                            <span>${i.name} x${i.qty}</span>
                            <span>${sub.toFixed(2)}</span>
                         </div>`;
            }

            let html = `
                <div style="width: 100%; text-align:center; padding: 5px;">
                    <h3 style="margin:0 0 5px 0; font-size: 16px;">${store}</h3>
                    <p style="font-size: 10px; margin:0;">${new Date().toLocaleString('ar-EG')}</p>
                    <div style="border-top: 1px dashed black; margin: 8px 0;"></div>
                    ${rows}
                    <div style="border-top: 1px dashed black; margin: 8px 0;"></div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
                        <span>الإجمالي:</span>
                        <span>${total.toFixed(2)} ج.م</span>
                    </div>
                    <div style="border-top: 1px dashed black; margin: 8px 0;"></div>
                    <p style="font-size: 10px;">شكراً لزيارتكم - سيستم فطين</p>
                    <div style="height: 30px;"></div> </div>`;
            
            document.getElementById('receipt').innerHTML = html;
            window.print();
            cart = {}; updateUI();
            showToast("🧾 تمت الطباعة");
        }
    </script>
</body>
</html>س
