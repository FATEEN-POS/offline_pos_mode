<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فطين POS - النظام الشامل</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #2a36b1; --bg: #f8f9ff; --accent: #00ff00; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }
        
        /* شاشة البداية (اختيار النشاط) */
        #setup-screen { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .industry-card { width: 100%; max-width: 300px; padding: 20px; margin: 10px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .industry-card:hover { border-color: var(--primary); background: #f0f2ff; }

        /* منطقة الكاميرا */
        #scanner-container { position: absolute; top: 0; width: 100%; height: 45%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 260px; height: 160px; border: 3px solid var(--accent); border-radius: 15px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }

        /* واجهة السلة */
        .pos-interface { position: absolute; bottom: 0; width: 100%; height: 58%; background: var(--bg); border-radius: 30px 30px 0 0; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 20; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-price { color: var(--primary); font-size: 32px; font-weight: 900; }
        
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .item { background: #fff; padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item-info b { display: block; font-size: 16px; }
        .item-qty { background: #eee; padding: 5px 12px; border-radius: 10px; display: flex; gap: 10px; align-items: center; }
        
        .btn-print { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* منطقة الطباعة */
        #receipt { display: none; padding: 20px; font-family: monospace; width: 80mm; background: #fff; direction: rtl; }
        @media print {
            body * { visibility: hidden; }
            #receipt, #receipt * { visibility: visible; }
            #receipt { position: absolute; left: 0; top: 0; display: block !important; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color:var(--primary)">فطين POS</h1>
        <p>اختر نوع النشاط لتحميل المنتجات أوفلاين</p>
        <div class="industry-card" onclick="initSystem('supermarket')">🛒 سوبر ماركت</div>
        <div class="industry-card" onclick="initSystem('pharmacy')">💊 صيدلية</div>
        <div id="loading-msg" style="display:none; color: blue;">جاري تحميل آلاف المنتجات...</div>
    </div>

    <div id="scanner-container">
        <div class="overlay"></div>
    </div>

    <div class="pos-interface">
        <div class="header">
            <div>
                <h2 style="margin:0; font-size: 18px;">السلة الحالية</h2>
                <small id="status" style="color: green;">الماسح نشط ✅</small>
            </div>
            <div id="total-val" class="total-price">0.00 ج.م</div>
        </div>

        <div id="cart" class="cart-items"></div>

        <button class="btn-print" onclick="printInvoice()">🖨️ طباعة الفاتورة (الوقت تلقائي)</button>
    </div>

    <div id="receipt"></div>

    <script>
        // قاعدة بيانات ضخمة (محاكاة لما يتم سحبه أوفلاين)
        const industryDatabases = {
            supermarket: {
                "6221007011447": { name: "بسكويت شاي لوتس", price: 10.00 },
                "6223000181111": { name: "مياه نسله 1.5 لتر", price: 8.50 },
                "6221031261115": { name: "لتر جهينة كامل الدسم", price: 45.00 },
                "6224000000123": { name: "شيبسي عائلي ملح", price: 15.00 },
                "01234567": { name: "بيبسي كانز 330 مل", price: 12.00 }
            },
            pharmacy: {
                "0000001": { name: "بندول اكسترا", price: 35.00 },
                "0000002": { name: "كونجستال أقراص", price: 20.00 }
            }
        };

        let currentDB = {};
        let cart = {};

        // تشغيل النظام
        function initSystem(type) {
            document.getElementById('loading-msg').style.display = 'block';
            
            // تخزين نوع النشاط في ذاكرة المتصفح للأبد (Offline Cache)
            localStorage.setItem('fatin_setup', 'done');
            localStorage.setItem('fatin_type', type);
            
            // تحميل الداتا
            currentDB = industryDatabases[type];
            localStorage.setItem('fatin_db', JSON.stringify(currentDB));

            document.getElementById('setup-screen').style.display = 'none';
            startScanner();
        }

        // فحص إذا كان المستخدم مسجل مسبقاً
        if(localStorage.getItem('fatin_setup') === 'done') {
            currentDB = JSON.parse(localStorage.getItem('fatin_db'));
            document.getElementById('setup-screen').style.display = 'none';
            startScanner();
        }

        function startScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scanner-container'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "code_128_reader", "ean_8_reader"] }
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((result) => {
                const code = result.codeResult.code;
                if (code && !window.isScanning) {
                    window.isScanning = true;
                    handleScan(code);
                    setTimeout(() => { window.isScanning = false; }, 2000);
                }
            });
        }

        function handleScan(code) {
            let product = currentDB[code];
            
            if (!product) {
                beep(400);
                const name = prompt("صنف جديد! ادخل الاسم:", "منتج غير مسجل");
                const price = prompt("ادخل السعر:", "0.00");
                if (name && price) {
                    product = { name, price: parseFloat(price) };
                    currentDB[code] = product;
                    localStorage.setItem('fatin_db', JSON.stringify(currentDB));
                } else return;
            }

            if (cart[code]) cart[code].qty++;
            else cart[code] = { ...product, qty: 1 };
            
            beep(100);
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart');
            container.innerHTML = '';
            let total = 0;
            for (let id in cart) {
                let item = cart[id];
                total += item.price * item.qty;
                container.innerHTML += `
                    <div class="item">
                        <div class="item-info"><b>${item.name}</b><small>${item.price.toFixed(2)} ج.م</small></div>
                        <div class="item-qty">
                            <span onclick="changeQty('${id}', -1)" style="cursor:pointer">➖</span>
                            <b>${item.qty}</b>
                            <span onclick="changeQty('${id}', 1)" style="cursor:pointer">➕</span>
                        </div>
                    </div>`;
            }
            document.getElementById('total-val').innerText = total.toFixed(2) + " ج.م";
        }

        function changeQty(id, delta) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        function printInvoice() {
            if (Object.keys(cart).length === 0) return alert("السلة فارغة");
            const now = new Date();
            let html = `
                <div style="text-align:center; border-bottom: 1px dashed #000; padding-bottom: 10px;">
                    <h2 style="margin:0">فاتورة مبيعات فطين</h2>
                    <p>${now.toLocaleDateString('ar-EG')} - ${now.toLocaleTimeString('ar-EG')}</p>
                </div>
                <table style="width:100%; margin-top:10px; border-collapse: collapse;">
                    <tr><th style="text-align:right">الصنف</th><th>كمية</th><th>إجمالي</th></tr>`;
            
            let grandTotal = 0;
            for (let id in cart) {
                let item = cart[id];
                let sub = item.price * item.qty;
                grandTotal += sub;
                html += `<tr><td>${item.name}</td><td style="text-align:center">${item.qty}</td><td style="text-align:left">${sub.toFixed(2)}</td></tr>`;
            }
            
            html += `</table>
                <div style="border-top: 1px dashed #000; margin-top:10px; padding-top:10px; font-weight:bold; font-size: 18px;">
                    الإجمالي: ${grandTotal.toFixed(2)} ج.م
                </div>
                <p style="text-align:center; margin-top:20px;">شكراً لزيارتكم</p>`;

            document.getElementById('receipt').innerHTML = html;
            window.print();
            if(confirm("بدء فاتورة جديدة؟")) { cart = {}; updateUI(); }
        }

        function beep(d) {
            const a = new AudioContext();
            const o = a.createOscillator();
            o.connect(a.destination);
            o.start(); o.stop(a.currentTime + (d/1000));
        }
    </script>
</body>
</html>
