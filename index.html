<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فطين POS - الماسح والطباعة</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #2a36b1; --bg: #f8f9ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }

        /* منطقة الكاميرا */
        #interactive.viewport { position: absolute; top: 0; width: 100%; height: 50%; background: #000; }
        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-overlay {
            position: absolute; top: 0; width: 100%; height: 50%;
            display: flex; justify-content: center; align-items: center; pointer-events: none;
        }
        .scan-frame { width: 260px; height: 160px; border: 3px solid #00ff00; border-radius: 15px; box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6); z-index: 10; }

        /* البطاقة السفلية */
        .pos-sheet {
            position: absolute; bottom: 0; width: 100%; height: 53%;
            background: var(--bg); border-radius: 30px 30px 0 0; padding: 20px;
            display: flex; flex-direction: column; z-index: 20;
        }

        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #ddd; pb: 10px; }
        .price-tag { color: var(--primary); font-size: 30px; font-weight: 800; }

        .items-list { flex: 1; overflow-y: auto; padding-top: 10px; }
        .product-item {
            background: #fff; padding: 12px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .qty-controls { display: flex; align-items: center; gap: 12px; background: #eef1f4; padding: 5px 10px; border-radius: 10px; }
        .qty-btn { border: none; background: none; font-size: 20px; color: var(--primary); cursor: pointer; font-weight: bold; }

        .btn-print {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* تنسيق الفاتورة عند الطباعة فقط */
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; }
            #receipt-print { position: absolute; left: 0; top: 0; width: 100%; font-family: 'Courier New', monospace; padding: 10px; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <div id="interactive" class="viewport"></div>
    <div class="scan-overlay"><div class="scan-frame"></div></div>

    <div class="pos-sheet">
        <div class="sheet-header">
            <div>
                <h2 style="margin:0; font-size: 18px;">السلة الذكية</h2>
                <span id="status" style="color:#27ae60; font-size: 12px;">جاري المسح...</span>
            </div>
            <div id="totalPrice" class="price-tag">0.00 ج.م</div>
        </div>

        <div id="cartContent" class="items-list">
            </div>

        <button class="btn-print" onclick="printReceipt()">🖨️ طباعة الفاتورة</button>
    </div>

    <div id="receipt-print" style="display: none;"></div>

    <script>
        // --- 1. قاعدة بيانات المنتجات (الاسم والسعر الحقيقي) ---
        const productsDB = {
            "6221007011447": { name: "بسكويت شاي لوتس", price: 10.00 },
            "6223000181111": { name: "مياه نسله 1.5ل", price: 8.00 },
            "6221100012345": { name: "شيبسي عائلي", price: 15.00 },
            "01234567": { name: "بيبسي كانز", price: 12.00 }
        };

        let cart = {};

        // --- 2. تشغيل الكاميرا ---
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "code_128_reader", "ean_8_reader"] }
        }, (err) => { if (!err) Quagga.start(); });

        // --- 3. عند التقاط الباركود ---
        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            if (code && !window.scanning) {
                window.scanning = true;
                beep();
                handleScannedCode(code);
                setTimeout(() => { window.scanning = false; }, 1500); // تأخير لعدم التكرار
            }
        });

        function handleScannedCode(code) {
            const product = productsDB[code] || { name: "صنف جديد " + code, price: 20.00 };
            
            if (cart[code]) {
                cart[code].qty++;
            } else {
                cart[code] = { ...product, qty: 1 };
            }
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cartContent');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            let total = 0;

            for (let id in cart) {
                const item = cart[id];
                total += item.price * item.qty;
                container.innerHTML += `
                    <div class="product-item">
                        <div>
                            <h4 style="margin:0;">${item.name}</h4>
                            <span style="color:var(--primary); font-weight:bold;">${item.price.toFixed(2)} ج.م</span>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${id}', -1)">−</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                        </div>
                    </div>`;
            }
            totalDisplay.innerText = total.toFixed(2) + " ج.م";
        }

        function changeQty(id, delta) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        // --- 4. وظيفة الطباعة ---
        function printReceipt() {
            if (Object.keys(cart).length === 0) return alert("السلة فارغة!");
            
            let receiptHtml = `
                <div style="text-align: center; direction: rtl;">
                    <h3>فطين POS - أسوان</h3>
                    <p>التاريخ: ${new Date().toLocaleString('ar-EG')}</p>
                    <hr>
                    <table style="width:100%; border-collapse: collapse;">
                        <tr><th>الصنف</th><th>كمية</th><th>سعر</th></tr>`;
            
            let total = 0;
            for (let id in cart) {
                const item = cart[id];
                const subtotal = item.price * item.qty;
                total += subtotal;
                receiptHtml += `<tr><td>${item.name}</td><td>${item.qty}</td><td>${subtotal.toFixed(2)}</td></tr>`;
            }

            receiptHtml += `
                    </table>
                    <hr>
                    <h4>الإجمالي: ${total.toFixed(2)} ج.م</h4>
                    <p>شكراً لزيارتكم</p>
                </div>`;

            const printArea = document.getElementById('receipt-print');
            printArea.innerHTML = receiptHtml;
            printArea.style.display = 'block';
            window.print();
            printArea.style.display = 'none';
        }

        function beep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            osc.connect(context.destination);
            osc.start(); osc.stop(context.currentTime + 0.1);
        }
    </script>
</body>
</html>
