<script>
    // جلب البيانات من المخزن الحقيقي (LocalStorage)
    let inventory = JSON.parse(localStorage.getItem('fatin_inventory')) || {};
    let cart = [];

    const barcodeInput = document.getElementById('barcodeInput');
    const itemsList = document.getElementById('itemsList');
    const finalTotalDisplay = document.getElementById('finalTotal');
    const itemCountDisplay = document.getElementById('itemCount');

    barcodeInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const code = this.value;
            addToCart(code);
            this.value = '';
        }
    });

    function addToCart(code) {
        // البحث في المخزن اللي سجلناه في الصفحة التانية
        const product = inventory[code]; 
        
        if (product) {
            const existing = cart.find(item => item.barcode === code);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        } else {
            alert("هذا الباركود غير مسجل في المخزن! اذهب لصفحة المخزن أولاً.");
        }
    }

    function updateQty(barcode, delta) {
        const item = cart.find(i => i.barcode === barcode);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.barcode !== barcode);
            renderCart();
        }
    }

    function renderCart() {
        itemsList.innerHTML = '';
        let total = 0;
        let count = 0;

        cart.forEach(item => {
            total += item.price * item.qty;
            count += item.qty;
            itemsList.innerHTML += `
                <div class="item-card">
                    <div>
                        <h4 style="margin:0;">${item.name}</h4>
                        <span style="color:#1a237e; font-weight:bold;">${(item.price * item.qty).toFixed(2)} ج.م</span>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item.barcode}', -1)">−</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty('${item.barcode}', 1)">+</button>
                    </div>
                </div>`;
        });

        itemCountDisplay.innerText = `إجمالي ${count} أصناف`;
        finalTotalDisplay.innerText = `${total.toFixed(2)} ج.م`;
    }

    function printReceipt() {
        if (cart.length === 0) return alert("السلة فارغة!");
        // هنا نقوم بتسجيل المبيعات للتقارير قبل الطباعة
        saveToReports(cart, parseFloat(finalTotalDisplay.innerText));
        window.print();
        cart = [];
        renderCart();
    }

    function saveToReports(currentCart, total) {
        let reports = JSON.parse(localStorage.getItem('fatin_reports')) || [];
        reports.push({ date: new Date().toLocaleString(), items: currentCart, total: total });
        localStorage.setItem('fatin_reports', JSON.stringify(reports));
    }
</script>
