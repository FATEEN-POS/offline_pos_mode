<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فطين POS - الماسح الذكي</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }

        /* منطقة الكاميرا (الخلفية) */
        .camera-view {
            position: relative;
            height: 60%; /* الجزء العلوي للكاميرا */
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://via.placeholder.com/800x600?text=Camera+Feed') no-repeat center center;
            background-size: cover;
        }

        /* مربع تحديد الباركود */
        .scanner-overlay {
            width: 200px;
            height: 200px;
            border: 2px solid rgba(121, 255, 121, 0.8);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3);
        }

        /* أيقونات التحكم الجانبية */
        .side-controls {
            position: absolute;
            right: 20px;
            top: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .icon-btn {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* البطاقة السفلية (Scanned Items) */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
            background: #f8f9ff;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .total-label { color: #888; font-size: 14px; }
        .total-price { color: #1a237e; font-size: 24px; font-weight: bold; }

        .scanned-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .item-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .item-info h4 { margin: 0; font-size: 16px; color: #333; }
        .item-info span { color: #666; font-size: 14px; }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f2f5;
            padding: 5px 12px;
            border-radius: 10px;
        }
        .qty-btn { border: none; background: none; font-size: 18px; color: #1a237e; cursor: pointer; }

        /* زر المراجعة الكبير */
        .review-btn {
            background: #2a36b1;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="camera-view">
        <div class="scanner-overlay"></div>
        
        <div class="side-controls">
            <button class="icon-btn">⚙️</button>
            <button class="icon-btn">🔦</button>
            <button class="icon-btn">📹</button>
        </div>
    </div>

    <div class="bottom-sheet">
        <div class="sheet-header">
            <div>
                <h2 style="margin:0; font-size: 20px;">الأصناف الممسوحة</h2>
                <span style="color:#888;">إجمالي 2 صنف</span>
            </div>
            <div style="text-align: left;">
                <span class="total-label">السعر الإجمالي</span><br>
                <span class="total-price">15.00 ج.م</span>
            </div>
        </div>

        <div class="scanned-list">
            <div class="item-card">
                <div class="item-info">
                    <h4>بسكويت 50-50</h4>
                    <span>5.00 ج.م</span>
                </div>
                <div class="quantity-control">
                    <button class="qty-btn">−</button>
                    <span>1</span>
                    <button class="qty-btn">+</button>
                </div>
            </div>

            <div class="item-card">
                <div class="item-info">
                    <h4>بوربون (Bourbon)</h4>
                    <span>10.00 ج.م</span>
                </div>
                <div class="quantity-control">
                    <button class="qty-btn">−</button>
                    <span>1</span>
                    <button class="qty-btn">+</button>
                </div>
            </div>
        </div>

        <button class="review-btn">
            📋 مراجعة الطلب
        </button>
    </div>

</body>
</html>
