<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فطين POS - الإصدار الاحترافي المطور</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { 
            --primary: #2a36b1; --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a; --accent: #4caf50;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #f5f5f5; --primary: #7986cb;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .industry-card { width: 100%; max-width: 300px; padding: 25px; margin: 10px; background: var(--primary); color: white; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 1.2rem; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #scanner-container { position: absolute; top: 0; width: 100%; height: 35%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .top-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 100; }
        .control-btn { background: rgba(255,255,255,0.9); color: #333; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }

        .pos-interface { position: absolute; bottom: 0; width: 100%; height: 67%; background: var(--bg); border-radius: 25px 25px 0 0; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 20; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .total-box { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .total-price { color: var(--primary); font-size: 1.8rem; font-weight: 900; }
        
        .cart-items { flex: 1; overflow-y: auto; padding: 5px; }
        .item { background: var(--card); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); animation: slideIn 0.3s ease; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-print { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        #product-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .modal-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; transition: 0.5s; z-index: 5000; }

        #receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt, #receipt * { visibility: visible; }
            #receipt { position: absolute; left: 0; top: 0; display: block !important; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="product-modal">
        <div class="modal-content">
            <h3 style="margin:0; text-align:center;">منتج جديد 🛍️</h3>
            <input type="text" id="new-name" placeholder="اسم المنتج">
            <input type="number" id="new-price" placeholder="السعر">
            <button class="modal-btn" onclick="saveNewProduct()">إضافة للسلة وحفظ</button>
        </div>
    </div>

    <div id="setup-screen">
        <h2 style="color:var(--primary)">فطين POS</h2>
        <button class="industry-card" onclick="initSystem('supermarket')">🛒 سوبر ماركت</button>
        <button class="industry-card" onclick="initSystem('pharmacy')">💊 صيدلية</button>
    </div>

    <div id="scanner-container">
        <div class="top-bar">
            <button class="control-btn" onclick="toggleFlash()">🔦 كشاف</button>
            <button class="control-btn" onclick="toggleTheme()">🌓 ثيم</button>
            <button class="control-btn" onclick="setStoreName()">🏢 اسم المحل</button>
        </div>
    </div>

    <div class="pos-interface">
        <div class="total-box">
            <div>
                <div id="s-name-display" style="font-size: 0.8rem; opacity: 0.7;">متجر فطين</div>
                <div style="font-weight: bold;">الإجمالي</div>
            </div>
            <div class="total-price"><span id="total-val">0.00</span> <small>ج.م</small></div>
        </div>

        <div id="cart" class="cart-items">
            <p id="empty-msg" style="text-align:center; opacity:0.5; margin-top:50px;">السلة فارغة.. ابدأ المسح</p>
        </div>

        <button class="btn-print" onclick="printInvoice()">🖨️ طباعة الفاتورة</button>
    </div>

    <div id="receipt"></div>

    <script>
        let currentDB = {}, cart = {}, currentScanCode = "", flashOn = false;

        window.onload = () => {
            if(localStorage.getItem('fatin_setup') === 'done') {
                currentDB = JSON.parse(localStorage.getItem('fatin_db')) || {};
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('s-name-display').innerText = localStorage.getItem('store_name') || "متجر فطين";
                startScanner();
            }
            if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
            showToast("🚀 نظام فطين POS جاهز");
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.bottom = "30px";
            setTimeout(() => t.style.bottom = "-100px", 3000);
        }

        function toggleTheme() {
            const isDark = document.body.hasAttribute('data-theme');
            isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        async function toggleFlash() {
            const track = Quagga.CameraAccess.getActiveTrack();
            if (track && track.getCapabilities().torch) {
                flashOn = !flashOn;
                await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                showToast(flashOn ? "🔦 الكشاف يعمل" : "🔦 الكشاف مطفأ");
            } else { showToast("⚠️ الفلاش غير متاح"); }
        }

        function setStoreName() {
            const n = prompt("ادخل اسم محلك:");
            if(n) {
                localStorage.setItem('store_name', n);
                document.getElementById('s-name-display').innerText = n;
            }
        }

        function initSystem(type) {
            localStorage.setItem('fatin_setup', 'done');
            // أصناف تجريبية
            const initialData = (type === 'supermarket') ? 
                {"6221007011447":{name:"لوتس", price:10}, "6223000181111":{name:"مياه نسله", price:8.5}} : 
                {"0000001":{name:"بندول", price:35}};
            localStorage.setItem('fatin_db', JSON.stringify(initialData));
            location.reload();
        }

        function startScanner() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#scanner-container'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "code_128_reader", "ean_8_reader"] }
            }, (err) => { if (!err) Quagga.start(); });

            Quagga.onDetected((res) => {
                const code = res.codeResult.code;
                if (!window.busy && code) {
                    window.busy = true;
                    handleScan(code);
                    setTimeout(() => window.busy = false, 2000);
                }
            });
        }

        function handleScan(code) {
            currentScanCode = code;
            if (currentDB[code]) {
                addToCart(code);
                showToast("✅ تم إضافة: " + currentDB[code].name);
            } else {
                document.getElementById('product-modal').style.display = 'flex';
                document.getElementById('new-name').focus();
            }
        }

        function saveNewProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            if (name && price) {
                currentDB[currentScanCode] = { name, price: parseFloat(price) };
                localStorage.setItem('fatin_db', JSON.stringify(currentDB));
                addToCart(currentScanCode);
                document.getElementById('product-modal').style.display = 'none';
                document.getElementById('new-name').value = "";
                document.getElementById('new-price').value = "";
                showToast("💾 تم الحفظ والإضافة");
            }
        }

        function addToCart(code) {
            if (cart[code]) {
                cart[code].qty++; 
            } else {
                cart[code] = { ...currentDB[code], qty: 1 };
            }
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart');
            const emptyMsg = document.getElementById('empty-msg');
            
            // مسح القائمة القديمة لإعادة بنائها
            container.innerHTML = '';
            let total = 0;
            const itemsArray = Object.keys(cart);

            if (itemsArray.length === 0) {
                container.innerHTML = '<p id="empty-msg" style="text-align:center; opacity:0.5; margin-top:50px;">السلة فارغة.. ابدأ المسح</p>';
            } else {
                itemsArray.forEach(id => {
                    let i = cart[id];
                    total += i.price * i.qty;
                    container.innerHTML += `
                        <div class="item">
                            <div><b>${i.name}</b><br><small>${i.price} ج.م</small></div>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <button onclick="changeQty('${id}',-1)" style="border:none; padding:8px 12px; border-radius:8px; background:#eee;">-</button>
                                <b>${i.qty}</b>
                                <button onclick="changeQty('${id}',1)" style="border:none; padding:8px 12px; border-radius:8px; background:#eee;">+</button>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        function changeQty(id, d) {
            cart[id].qty += d;
            if(cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        function printInvoice() {
            if (Object.keys(cart).length === 0) {
                showToast("⚠️ السلة فارغة!");
                return;
            }
            const store = localStorage.getItem('store_name') || "متجر فطين";
            let html = `<div style="text-align:center; direction:rtl; font-family:sans-serif; padding:20px;">
                <h2 style="margin-bottom:5px;">${store}</h2>
                <p style="font-size:12px;">${new Date().toLocaleString('ar-EG')}</p>
                <hr style="border-top: 1px dashed #000;">`;
            
            let total = 0;
            for (let id in cart) {
                let i = cart[id];
                total += i.price * i.qty;
                html += `<div style="display:flex; justify-content:space-between; margin:5px 0;">
                    <span>${i.name} (${i.qty})</span>
                    <span>${(i.price * i.qty).toFixed(2)}</span>
                </div>`;
            }
            
            html += `<hr style="border-top: 1px dashed #000;">
                <h3 style="display:flex; justify-content:space-between;"><span>الإجمالي:</span> <span>${total.toFixed(2)} ج.م</span></h3>
                <p style="margin-top:20px; font-size:12px;">شكراً لتعاملكم مع سيستم فطين</p>
            </div>`;
            
            document.getElementById('receipt').innerHTML = html;
            window.print();
            showToast("🧾 تم إصدار الفاتورة بنجاح");
            
            // تفريغ السلة لبدء عملية جديدة
            cart = {};
            updateUI();
        }
    </script>
</body>
</html>
