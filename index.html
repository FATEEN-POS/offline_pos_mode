<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فطين POS - الماسح الفعلي</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #2a36b1; --bg: #f8f9ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }

        /* منطقة الكاميرا الحقيقية */
        #interactive.viewport {
            position: absolute; top: 0; width: 100%; height: 55%; background: #000;
        }
        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
        canvas.drawingBuffer { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }

        .scan-overlay {
            position: absolute; top: 0; width: 100%; height: 55%;
            display: flex; justify-content: center; align-items: center; pointer-events: none;
        }
        .scan-frame {
            width: 250px; height: 150px; border: 2px solid #00ff00; border-radius: 15px;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.5); z-index: 10;
        }

        /* البطاقة السفلية */
        .pos-sheet {
            position: absolute; bottom: 0; width: 100%; height: 48%;
            background: var(--bg); border-radius: 30px 30px 0 0; padding: 20px;
            display: flex; flex-direction: column; z-index: 20;
        }

        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-tag { color: var(--primary); font-size: 28px; font-weight: 800; }

        .items-list { flex: 1; overflow-y: auto; }
        .product-item {
            background: #fff; padding: 15px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .qty-controls { display: flex; align-items: center; gap: 15px; background: #f0f2f5; padding: 5px 12px; border-radius: 10px; }
        .qty-btn { border: none; background: none; font-size: 20px; color: var(--primary); cursor: pointer; font-weight: bold; }

        .btn-confirm {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="interactive" class="viewport"></div>
    <div class="scan-overlay">
        <div class="scan-frame"></div>
    </div>

    <div class="pos-sheet">
        <div class="sheet-header">
            <div>
                <h2 style="margin:0; font-size: 20px;">الأصناف الممسوحة</h2>
                <span id="itemsCount" style="color:#777;">جاري تشغيل الكاميرا...</span>
            </div>
            <div id="totalPrice" class="price-tag">0.00 ج.م</div>
        </div>

        <div id="cartContent" class="items-list"></div>

        <button class="btn-confirm" onclick="location.reload()">✅ مراجعة وطباعة</button>
    </div>

    <script>
        // داتا المنتجات (تقدر تزودها براحتك)
        const productsDB = {
            "6221007011447": { name: "بسكويت شاي مصري", price: 5.00 },
            "6223000181111": { name: "مياه معدنية", price: 7.00 }
        };

        let cart = {};

        // تشغيل الكاميرا والماسح
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: { facingMode: "environment" }
            },
            decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
        }, function(err) {
            if (err) { console.error(err); return; }
            Quagga.start();
            document.getElementById('itemsCount').innerText = "الماسح جاهز..";
        });

        // عند التقاط باركود
        Quagga.onDetected(function(result) {
            const code = result.codeResult.code;
            if (code) {
                // منع التكرار السريع في نفس اللحظة
                beep();
                handleScannedCode(code);
                Quagga.offDetected(); // إيقاف مؤقت لمنع التكرار
                setTimeout(() => { Quagga.onDetected(onDetectedHandler); }, 2000);
            }
        });

        const onDetectedHandler = (result) => {
            const code = result.codeResult.code;
            beep();
            handleScannedCode(code);
        };

        function handleScannedCode(code) {
            const product = productsDB[code] || { name: "منتج جديد (" + code + ")", price: 10.00 };
            
            if (cart[code]) {
                cart[code].qty++;
            } else {
                cart[code] = { ...product, qty: 1 };
            }
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cartContent');
            const totalDisplay = document.getElementById('totalPrice');
            container.innerHTML = '';
            let total = 0;

            for (let id in cart) {
                const item = cart[id];
                total += item.price * item.qty;
                container.innerHTML += `
                    <div class="product-item">
                        <div>
                            <h4 style="margin:0;">${item.name}</h4>
                            <span style="color:var(--primary); font-weight:bold;">${item.price.toFixed(2)} ج.م</span>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${id}', -1)">−</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                        </div>
                    </div>`;
            }
            totalDisplay.innerText = total.toFixed(2) + " ج.م";
        }

        function changeQty(id, delta) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        function beep() {
            const context = new AudioContext();
            const oscillator = context.createOscillator();
            oscillator.type = "sine";
            oscillator.frequency.value = 800;
            oscillator.connect(context.destination);
            oscillator.start();
            setTimeout(() => oscillator.stop(), 100);
        }
    </script>
</body>
</html>
