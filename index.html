<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فطين POS - الكاشير</title>
    <link rel="stylesheet" href="style.css"> <style>
        .pos-container { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 40px); }
        .billing-panel { flex: 2; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .action-panel { flex: 1; background: #2c3e50; border-radius: 10px; padding: 20px; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .total-section { margin-top: auto; border-top: 2px solid #eee; padding-top: 20px; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-pay { background: #27ae60; color: white; }
        .input-barcode { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="pos-container">
        <div class="billing-panel">
            <h2>🛒 فاتورة جديدة</h2>
            <table>
                <thead>
                    <tr>
                        <th>الصنف</th>
                        <th>السعر</th>
                        <th>الكمية</th>
                        <th>الإجمالي</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
            <div class="total-section">
                <div style="display:flex; justify-content: space-between;"><span>المجموع:</span> <span>0.00 ج.م</span></div>
                <div style="display:flex; justify-content: space-between; color: #e67e22;"><span>الضريبة (14%):</span> <span>0.00 ج.م</span></div>
                <div style="display:flex; justify-content: space-between; font-size: 24px; font-weight: bold; color: #27ae60;"><span>الإجمالي النهائي:</span> <span>0.00 ج.م</span></div>
            </div>
        </div>
        <div class="action-panel">
            <h3>التحكم الذكي</h3>
            <input type="text" class="input-barcode" placeholder="امسح الباركود هنا..." autofocus>
            <button class="btn btn-pay">💳 دفع وطباعة (F10)</button>
            <button class="btn" style="background:#3498db; color:white;">🔍 بحث عن صنف</button>
            <button class="btn" style="background:#e74c3c; color:white;">🗑️ إلغاء الفاتورة</button>
            <div style="margin-top: 20px; font-size: 13px; opacity: 0.8;">
                <p>المستخدم: كاشير 1</p>
                <p>الفرع: أسوان - المركز</p>
                <a href="inventory.html" style="color: #3498db; text-decoration: none;">⚙️ إدارة المخزن</a> | 
                <a href="reports.html" style="color: #3498db; text-decoration: none;">📊 التقارير</a>
            </div>
        </div>
    </div>
</body>
</html>
